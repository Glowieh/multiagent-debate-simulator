name: CI

on:
  pull_request:
    branches: [master]

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    env:
      LANGSMITH_TRACING: "false"
    defaults:
      run:
        working-directory: app/DebateAgent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

      - name: Lint
        run: uv run ruff check .

      - name: Typecheck
        run: uv run pyright

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint:frontend

      - name: Build
        run: pnpm --filter frontend build

  agentcore-cdk:
    name: AgentCore CDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare deploy targets
        run: cp agentcore/aws-targets.example.json agentcore/aws-targets.json

      - name: Run CDK tests
        run: pnpm --filter agentcore-cdk-app test

      - name: Synthesize CDK stack
        run: pnpm --filter agentcore-cdk-app run cdk synth
